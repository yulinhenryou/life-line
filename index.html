<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LIFELINE is a minimal personal interactive map artwork." />
    <title>LIFELINE</title>
    <link rel="stylesheet" href="vendor/maplibre/maplibre-gl.css" />
    <link rel="stylesheet" href="styles/base.css?v=lifeline-30" />
    <link rel="stylesheet" href="styles/layout.css?v=lifeline-30" />
    <link rel="stylesheet" href="styles/map.css?v=lifeline-30" />
    <link rel="stylesheet" href="styles/components.css?v=lifeline-30" />
    <link rel="stylesheet" href="styles/responsive.css?v=lifeline-30" />
  </head>
  <body>
    <main class="lifeline-shell is-intro" id="lifeline-shell">
      <div id="map" class="map-canvas" aria-label="LIFELINE interactive map"></div>
      <div class="map-loading" id="map-loading">Loading map</div>

      <header class="brand-corner" aria-label="LIFELINE">
        <h1>LIFELINE</h1>
      </header>

      <section class="projection-toggle glass-panel" aria-label="Map projection">
        <button class="icon-button is-active" type="button" data-projection="flat" aria-label="Flat">
          <span class="flat-icon" aria-hidden="true"></span>
        </button>
        <button class="icon-button" type="button" data-projection="globe" aria-label="Globe">
          <span class="globe-icon" aria-hidden="true"></span>
        </button>
      </section>

      <section class="routes-toggle glass-panel" aria-label="Route mode">
        <button class="icon-button is-active" type="button" data-route-mode="footprint" aria-label="Footprint">
          <span class="route-icon route-footprint" aria-hidden="true"></span>
        </button>
        <button class="icon-button" type="button" data-route-mode="line" aria-label="Line">
          <span class="route-icon route-line" aria-hidden="true"></span>
        </button>
        <button class="icon-button" type="button" data-route-mode="journeys" aria-label="Journeys">
          <span class="route-icon route-journeys" aria-hidden="true"></span>
        </button>
      </section>

      <button class="back-world glass-panel" id="back-world" type="button" aria-label="Back to World" hidden>
        <span class="back-world-icon" aria-hidden="true"></span>
      </button>

      <button class="add-map-button glass-panel" id="add-map" type="button" aria-label="Add to Map">
        <span class="plus-icon" aria-hidden="true"></span>
      </button>

      <aside class="city-card glass-panel" id="city-card" aria-live="polite" hidden></aside>
      <aside class="side-panel glass-panel" id="add-panel" aria-label="Add to Map" hidden></aside>
      <aside class="side-panel glass-panel" id="visit-panel" aria-label="Add Visit" hidden></aside>
    </main>

    <script src="vendor/maplibre/maplibre-gl.js"></script>
    <script src="data/places.js?v=lifeline-30"></script>
    <script src="data/journeys.js?v=lifeline-30"></script>
    <script src="src/config.js?v=lifeline-30"></script>
    <script src="src/helpers.js?v=lifeline-30"></script>
    <script src="src/routes.js?v=lifeline-30"></script>
    <script src="src/panels.js?v=lifeline-30"></script>
    <script src="src/map.js?v=lifeline-30"></script>
    <script src="src/main.js?v=lifeline-30"></script>
  </body>
</html>

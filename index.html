<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="LIFELINE is a personal map of places visited across a lifetime." />
    <title>LIFELINE</title>
    <link rel="stylesheet" href="vendor/maplibre/maplibre-gl.css" />
    <link rel="stylesheet" href="styles/base.css?v=lifeline-v2" />
    <link rel="stylesheet" href="styles/layout.css?v=lifeline-v2" />
    <link rel="stylesheet" href="styles/map.css?v=lifeline-v2" />
    <link rel="stylesheet" href="styles/components.css?v=lifeline-v2" />
    <link rel="stylesheet" href="styles/responsive.css?v=lifeline-v2" />
  </head>
  <body>
    <main class="app-shell is-intro" id="app-shell">
      <div class="map-stage">
        <div id="map" class="map-canvas" aria-label="LIFELINE world map"></div>
        <div class="origin-pulse" id="origin-pulse" aria-hidden="true"></div>
      </div>

      <header class="topbar" aria-label="LIFELINE">
        <div>
          <p class="eyebrow">Personal Atlas</p>
          <h1>LIFELINE</h1>
        </div>
        <button class="icon-control" id="reset-view" type="button" aria-label="Reset world view" title="Reset view">
          <span aria-hidden="true"></span>
        </button>
      </header>

      <aside class="place-card" id="place-card" aria-live="polite" hidden></aside>

      <section class="map-status" id="map-status" aria-live="polite">
        <span>Loading map</span>
      </section>
    </main>

    <script src="vendor/maplibre/maplibre-gl.js"></script>
    <script src="data/places.js?v=lifeline-v2"></script>
    <script src="src/config.js?v=lifeline-v2"></script>
    <script src="src/helpers.js?v=lifeline-v2"></script>
    <script src="src/map.js?v=lifeline-v2"></script>
    <script src="src/main.js?v=lifeline-v2"></script>
  </body>
</html>
